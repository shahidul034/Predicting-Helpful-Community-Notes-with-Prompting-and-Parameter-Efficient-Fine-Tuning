# Model Configuration

models:
  baseline:
    tfidf:
      name: "tfidf_lr"
      max_features: 10000
      ngram_range: [1, 2]

    bert:
      name: "bert-base-uncased"
      max_length: 512

  prompting:
    model_name: "Qwen/Qwen3-4B-Instruct"
    temperature: 0.1
    max_tokens: 100
    few_shot_examples: 5

  finetuning:
    qwen:
      name: "Qwen/Qwen3-4B-Instruct"
      max_length: 512
      peft_type: "LORA"

    gemma:
      name: "google/gemma-3-4b-it"
      max_length: 512
      peft_type: "LORA"

  lora_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    task_type: "CAUSAL_LM"
